<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earth 3D</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            image-rendering: pixelated;
            overscroll-behavior: none;
            position: fixed;
            background: #000000;
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
        }

        .tab-content {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: rgb(22, 22, 27);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            pointer-events: none;
            border-radius: 0;
        }

        .tab-content.active {
            transform: translateY(80px);
            pointer-events: auto;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-radius 0.3s ease;
        }

        .nav-panel {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(18, 18, 23, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 8px;
            display: flex;
            gap: 16px;
            z-index: 998;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            pointer-events: auto;
            touch-action: none;
        }

        .nav-panel.visible {
            bottom: 20px;
            opacity: 1;
        }

        .nav-button {
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-button.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .close-button {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(18, 18, 23, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .task-item {
            opacity: 0.5;
            pointer-events: none;
        }

        .task-item.completed {
            opacity: 0.5;
            pointer-events: none;
        }

        .task-item:not(.completed) {
            opacity: 1;
            pointer-events: auto;
        }

        /* Стили для предотвращения случайных свайпов */
        .tab-content-inner {
            height: calc(100% - 80px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 24px;
            touch-action: pan-y;
            overscroll-behavior: contain;
        }

        /* Добавляем порог для свайпа */
        .tab-content.active {
            transform: translateY(80px);
            pointer-events: auto;
        }

        .tab-content.closing {
            transform: translateY(100%);
        }

        /* Стили для TON Connect */
        .connect-wallet-btn {
            position: relative;
            overflow: hidden;
            transform: translateZ(0);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .connect-wallet-btn:active {
            transform: scale(0.98) translateZ(0);
        }
    </style>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="scene-container"></div>
    <div class="nav-panel">
        <div class="nav-button" data-section="profile">
            <i class="material-icons">person</i>
        </div>
        <div class="nav-button" data-section="planet">
            <i class="material-icons">public</i>
        </div>
        <div class="nav-button" data-section="tasks">
            <i class="material-icons">assignment</i>
        </div>
        <div class="nav-button" data-section="wallet">
            <i class="material-icons">account_balance_wallet</i>
        </div>
    </div>
    <div class="tab-content">
        <div class="tab-content-inner"></div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const navPanel = document.querySelector('.nav-panel');
            const tabContent = document.querySelector('.tab-content');
            const tabInner = document.querySelector('.tab-content-inner');
            let startY = 0;
            let currentY = 0;
            const SWIPE_THRESHOLD = 50;
            let isClosing = false;

            // Обработчик для кнопок навигации
            const navButtons = document.querySelectorAll('.nav-button');
            navButtons.forEach(button => {
                button.addEventListener('click', (e) => {
                    e.preventDefault();
                    const section = button.getAttribute('data-section');
                    handleNavClick(section, button);
                });
            });

            // Обработчик свайпов
            tabContent.addEventListener('touchstart', (e) => {
                if (tabContent.classList.contains('active')) {
                    startY = e.touches[0].clientY;
                    currentY = startY;
                    isClosing = false;
                }
            }, { passive: true });

            tabContent.addEventListener('touchmove', (e) => {
                if (tabContent.classList.contains('active')) {
                    currentY = e.touches[0].clientY;
                    const diff = currentY - startY;

                    if (diff > 0) { // Свайп вниз
                        if (diff > SWIPE_THRESHOLD && !isClosing) {
                            closeTab();
                            isClosing = true;
                        }
                    }
                }
            }, { passive: true });

            function closeTab() {
                const activeButton = document.querySelector('.nav-button.active');
                if (activeButton) {
                    activeButton.classList.remove('active');
                }
                tabContent.classList.add('closing');
                setTimeout(() => {
                    tabContent.classList.remove('active', 'closing');
                    tabInner.style.opacity = '0';
                }, 300);
            }

            // Проверка выполнения задания
            async function checkTaskCompletion(taskId) {
                try {
                    const response = await fetch('https://tg-earth-4dzw.vercel.app/api/check-tasks', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            task_id: taskId,
                            telegram_id: window.Telegram?.WebApp?.initDataUnsafe?.user?.id
                        })
                    });

                    const data = await response.json();
                    if (data.completed) {
                        const taskItem = document.querySelector(`[data-task-id="${taskId}"]`);
                        if (taskItem) {
                            taskItem.classList.add('completed');
                        }
                    }
                } catch (error) {
                    console.error('Error checking task completion:', error);
                }
            }

            // Инициализация TON Connect
            async function initTonConnect() {
                try {
                    const connector = new TonConnect({
                        manifestUrl: 'https://tg-earth-4dzw.vercel.app/tonconnect-manifest.json'
                    });

                    const connectButton = document.getElementById('connect-wallet-btn');
                    if (connectButton) {
                        connectButton.addEventListener('click', async () => {
                            try {
                                const wallets = await connector.getWallets();
                                const tonkeeper = wallets.find(w => w.name.toLowerCase().includes('tonkeeper'));

                                if (tonkeeper) {
                                    const universalLink = connector.connect({
                                        universalLink: tonkeeper.universalUrl,
                                        bridgeUrl: tonkeeper.bridgeUrl
                                    });

                                    if (window.Telegram?.WebApp) {
                                        window.Telegram.WebApp.openLink(universalLink, {
                                            try_instant_view: false
                                        });
                                    } else {
                                        window.location.href = universalLink;
                                    }
                                }
                            } catch (error) {
                                console.error('Wallet connection error:', error);
                            }
                        });
                    }
                } catch (error) {
                    console.error('TON Connect initialization error:', error);
                }
            }

            // Инициализация при загрузке
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }

            navPanel.classList.add('visible');
            initTonConnect();
        });
    </script>
    <script type="module" src="/js/main.js"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
</body>
</html>
