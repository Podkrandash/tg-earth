<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earth 3D</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            image-rendering: pixelated;
        }
        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        #loading-container {
            position: relative;
            width: 100px;
            height: 100px;
        }
        #loading-earth {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 32px;
            height: 32px;
            transform: translate(-50%, -50%) scale(3);
            background: url('textures/earth_daymap.jpg') no-repeat center/cover;
            border-radius: 50%;
            image-rendering: pixelated;
        }
        #loading-moon {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: #ccc;
            border-radius: 50%;
            transform-origin: 20px center;
            image-rendering: pixelated;
        }
        @keyframes rotate {
            from { transform: translate(-50%, -50%) scale(3) rotate(0deg); }
            to { transform: translate(-50%, -50%) scale(3) rotate(360deg); }
        }
        @keyframes orbit {
            from { transform: translate(-50%, -50%) rotate(0deg) translateX(20px); }
            to { transform: translate(-50%, -50%) rotate(360deg) translateX(20px); }
        }
        @keyframes explosion {
            0% { transform: translate(-50%, -50%) scale(3); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(4); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(5); opacity: 0; }
        }
        .nav-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 10px 20px;
            display: none;
            gap: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        .nav-panel.visible {
            display: flex;
            opacity: 1;
        }
        .nav-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 12px;
            opacity: 0.7;
            transition: opacity 0.3s;
            cursor: pointer;
            padding: 5px;
        }
        .nav-button:hover {
            opacity: 1;
        }
        .nav-button i {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .nav-button.active {
            opacity: 1;
        }
    </style>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script async src="https://unpkg.com/es-module-shims/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="loading-screen">
        <div id="loading-container">
            <div id="loading-earth"></div>
            <div id="loading-moon"></div>
        </div>
    </div>
    <div id="scene-container"></div>
    <div class="nav-panel">
        <div class="nav-button" onclick="handleNavClick('profile')">
            <i class="material-icons">person</i>
            <span>Профиль</span>
        </div>
        <div class="nav-button active" onclick="handleNavClick('planet')">
            <i class="material-icons">public</i>
            <span>Планета</span>
        </div>
        <div class="nav-button" onclick="handleNavClick('tasks')">
            <i class="material-icons">assignment</i>
            <span>Задания</span>
        </div>
        <div class="nav-button" onclick="handleNavClick('wallet')">
            <i class="material-icons">account_balance_wallet</i>
            <span>Кошелёк</span>
        </div>
    </div>
    <script type="module" src="/js/main.js"></script>
    <script>
        function handleNavClick(section) {
            document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            console.log('Переход в раздел:', section);
        }
    </script>
</body>
</html>
