<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earth 3D</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            image-rendering: pixelated;
            overscroll-behavior: none;
            position: fixed;
            background: #000000;
        }
        body * {
            overscroll-behavior: none;
            touch-action: none;
        }
        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            touch-action: none;
            z-index: 1;
        }
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        #loading-container {
            position: relative;
            width: 100px;
            height: 100px;
        }
        #loading-earth {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 48px;
            height: 48px;
            transform: translate(-50%, -50%);
            background: linear-gradient(45deg,
                #1a237e 0%, #1a237e 10%,    /* Темно-синий */
                #283593 10%, #283593 20%,   /* Синий */
                #3949ab 20%, #3949ab 30%,   /* Светло-синий */
                #42a5f5 30%, #42a5f5 40%,   /* Голубой (океаны) */
                #81c784 40%, #81c784 50%,   /* Зеленый (континенты) */
                #42a5f5 50%, #42a5f5 60%,   /* Голубой */
                #3949ab 60%, #3949ab 70%,   /* Светло-синий */
                #283593 70%, #283593 80%,   /* Синий */
                #1a237e 80%, #1a237e 90%,   /* Темно-синий */
                #0d47a1 90%, #0d47a1 100%   /* Глубокий синий */
            );
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(66, 165, 245, 0.5);
            image-rendering: pixelated;
        }
        #loading-moon {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: linear-gradient(45deg,
                #9e9e9e 0%, #9e9e9e 25%,    /* Светло-серый */
                #757575 25%, #757575 50%,   /* Серый */
                #616161 50%, #616161 75%,   /* Темно-серый */
                #424242 75%, #424242 100%   /* Очень темно-серый */
            );
            border-radius: 50%;
            transform-origin: 30px center;
            box-shadow: 0 0 5px rgba(158, 158, 158, 0.5);
            image-rendering: pixelated;
        }
        @keyframes rotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(90deg); }
            50% { transform: translate(-50%, -50%) rotate(180deg); }
            75% { transform: translate(-50%, -50%) rotate(270deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes orbit {
            0% { transform: translate(-50%, -50%) rotate(0deg) translateX(30px); }
            25% { transform: translate(-50%, -50%) rotate(90deg) translateX(30px); }
            50% { transform: translate(-50%, -50%) rotate(180deg) translateX(30px); }
            75% { transform: translate(-50%, -50%) rotate(270deg) translateX(30px); }
            100% { transform: translate(-50%, -50%) rotate(360deg) translateX(30px); }
        }
        @keyframes explosion {
            0% { 
                transform: translate(-50%, -50%);
                clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0% 50%, 40% 40%);
                opacity: 1;
            }
            50% { 
                transform: translate(-50%, -50%) rotate(45deg) scale(1.5);
                clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
                opacity: 0.7;
            }
            100% { 
                transform: translate(-50%, -50%) rotate(90deg) scale(3);
                clip-path: polygon(50% 0%, 70% 30%, 100% 50%, 70% 70%, 50% 100%, 30% 70%, 0% 50%, 30% 30%);
                opacity: 0;
            }
        }
        .explosion-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(45deg,
                #fff 0%, #fff 50%,
                #ccc 50%, #ccc 100%
            );
            border-radius: 2px;
            pointer-events: none;
            image-rendering: pixelated;
        }
        .nav-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 12px 24px;
            display: none;
            gap: 35px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
        }
        .nav-panel.visible {
            display: flex;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
        .nav-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-family: 'Roboto', Arial, sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.7;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            padding: 8px;
            position: relative;
        }
        .nav-button:hover {
            opacity: 1;
            transform: translateY(-2px);
        }
        .nav-button i {
            font-size: 22px;
            margin-bottom: 6px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-button.active {
            opacity: 1;
            color: #fff;
        }
        .nav-button.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
            }
            70% {
                box-shadow: 0 0 0 6px rgba(255, 255, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script async src="https://unpkg.com/es-module-shims/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="loading-screen">
        <div id="loading-container">
            <div id="loading-earth"></div>
            <div id="loading-moon"></div>
        </div>
    </div>
    <div id="scene-container"></div>
    <div class="nav-panel">
        <div class="nav-button" onclick="handleNavClick('profile')">
            <i class="material-icons">person</i>
            <span>Профиль</span>
        </div>
        <div class="nav-button active" onclick="handleNavClick('planet')">
            <i class="material-icons">public</i>
            <span>Планета</span>
        </div>
        <div class="nav-button" onclick="handleNavClick('tasks')">
            <i class="material-icons">assignment</i>
            <span>Задания</span>
        </div>
        <div class="nav-button" onclick="handleNavClick('wallet')">
            <i class="material-icons">account_balance_wallet</i>
            <span>Кошелёк</span>
        </div>
    </div>
    <script type="module" src="/js/main.js"></script>
    <script>
        function handleNavClick(section) {
            document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            console.log('Переход в раздел:', section);
        }
    </script>
</body>
</html>
