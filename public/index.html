<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earth 3D</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            image-rendering: pixelated;
            overscroll-behavior: none;
            position: fixed;
            background: #000000;
        }
        body * {
            overscroll-behavior: none;
            touch-action: none;
        }
        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            touch-action: none;
            z-index: 1;
        }
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        #loading-container {
            position: relative;
            width: 100px;
            height: 100px;
        }
        #loading-earth {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 48px;
            height: 48px;
            transform: translate(-50%, -50%);
            background: linear-gradient(45deg,
                #1a237e 0%, #1a237e 10%,    /* Темно-синий */
                #283593 10%, #283593 20%,   /* Синий */
                #3949ab 20%, #3949ab 30%,   /* Светло-синий */
                #42a5f5 30%, #42a5f5 40%,   /* Голубой (океаны) */
                #81c784 40%, #81c784 50%,   /* Зеленый (континенты) */
                #42a5f5 50%, #42a5f5 60%,   /* Голубой */
                #3949ab 60%, #3949ab 70%,   /* Светло-синий */
                #283593 70%, #283593 80%,   /* Синий */
                #1a237e 80%, #1a237e 90%,   /* Темно-синий */
                #0d47a1 90%, #0d47a1 100%   /* Глубокий синий */
            );
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(66, 165, 245, 0.5);
            image-rendering: pixelated;
        }
        #loading-moon {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: linear-gradient(45deg,
                #9e9e9e 0%, #9e9e9e 25%,    /* Светло-серый */
                #757575 25%, #757575 50%,   /* Серый */
                #616161 50%, #616161 75%,   /* Темно-серый */
                #424242 75%, #424242 100%   /* Очень темно-серый */
            );
            border-radius: 50%;
            transform-origin: 30px center;
            box-shadow: 0 0 5px rgba(158, 158, 158, 0.5);
            image-rendering: pixelated;
        }
        @keyframes rotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(90deg); }
            50% { transform: translate(-50%, -50%) rotate(180deg); }
            75% { transform: translate(-50%, -50%) rotate(270deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes orbit {
            0% { transform: translate(-50%, -50%) rotate(0deg) translateX(30px); }
            25% { transform: translate(-50%, -50%) rotate(90deg) translateX(30px); }
            50% { transform: translate(-50%, -50%) rotate(180deg) translateX(30px); }
            75% { transform: translate(-50%, -50%) rotate(270deg) translateX(30px); }
            100% { transform: translate(-50%, -50%) rotate(360deg) translateX(30px); }
        }
        @keyframes explosion {
            0% { 
                transform: translate(-50%, -50%);
                clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0% 50%, 40% 40%);
                opacity: 1;
            }
            50% { 
                transform: translate(-50%, -50%) rotate(45deg) scale(1.5);
                clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
                opacity: 0.7;
            }
            100% { 
                transform: translate(-50%, -50%) rotate(90deg) scale(3);
                clip-path: polygon(50% 0%, 70% 30%, 100% 50%, 70% 70%, 50% 100%, 30% 70%, 0% 50%, 30% 30%);
                opacity: 0;
            }
        }
        .explosion-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(45deg,
                #fff 0%, #fff 50%,
                #ccc 50%, #ccc 100%
            );
            border-radius: 2px;
            pointer-events: none;
            image-rendering: pixelated;
        }
        .nav-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgb(22, 22, 22);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 8px;
            display: flex;
            gap: 16px;
            z-index: 1000;
        }
        .nav-button {
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.4);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        .nav-button i {
            font-size: 24px;
            pointer-events: none;
        }
        .nav-button:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }
        .nav-button:hover {
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.08);
        }
        .nav-button.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.15);
        }
        .tab-content {
            position: fixed;
            top: 80px;
            left: 0;
            right: 0;
            width: 100%;
            height: 80px;
            background: rgb(22, 22, 22);
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            opacity: 0;
            transform: translateY(100%);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1001;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tab-content.active {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .tab-content-inner {
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            color: rgba(255, 255, 255, 0.9);
            opacity: 0;
            transition: opacity 0.3s ease;
            position: relative;
            overflow: hidden;
            pointer-events: auto;
            display: flex;
            align-items: center;
        }
        .tab-content h3 {
            margin: 0;
            font-size: 18px;
            font-weight: normal;
            color: rgba(255, 255, 255, 0.9);
        }
        .close-button {
            position: absolute;
            top: 22px;
            right: 15px;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.9);
            z-index: 1002;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            padding: 0;
        }
        .close-button:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script async src="https://unpkg.com/es-module-shims/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="loading-screen">
        <div id="loading-container">
            <div id="loading-earth"></div>
            <div id="loading-moon"></div>
        </div>
    </div>
    <div id="scene-container"></div>
    <div class="nav-panel">
        <div class="nav-button" data-section="profile">
            <i class="material-icons">person</i>
        </div>
        <div class="nav-button active" data-section="planet">
            <i class="material-icons">public</i>
        </div>
        <div class="nav-button" data-section="tasks">
            <i class="material-icons">assignment</i>
        </div>
        <div class="nav-button" data-section="wallet">
            <i class="material-icons">account_balance_wallet</i>
        </div>
    </div>
    <div class="tab-content">
        <div class="tab-content-inner">
            <!-- Content of the tab -->
        </div>
    </div>
    <script type="module" src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadingScreen = document.getElementById('loading-screen');
            const navPanel = document.querySelector('.nav-panel');
            const sceneContainer = document.getElementById('scene-container');
            
            // Показываем панель навигации сразу после загрузки сцены
            sceneContainer.addEventListener('transitionend', () => {
                if (sceneContainer.style.opacity === '1') {
                    navPanel.style.display = 'flex';
                }
            });
            
            // Add touch/click handlers
            document.querySelectorAll('.nav-button').forEach(button => {
                const section = button.getAttribute('data-section');
                
                ['click', 'touchend'].forEach(eventType => {
                    button.addEventListener(eventType, (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        handleNavClick(section, e);
                    }, { passive: false });
                });
            });
        });

        function handleNavClick(section, event) {
            const buttons = document.querySelectorAll('.nav-button');
            const clickedButton = event.currentTarget;
            const tabContent = document.querySelector('.tab-content');
            const tabInner = document.querySelector('.tab-content-inner');
            
            // Remove active class from all buttons
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Add active class to clicked button
            clickedButton.classList.add('active');
            
            // Update tab content
            let content = '';
            switch(section) {
                case 'profile':
                    content = `
                        <button class="close-button" type="button">
                            <i class="material-icons">close</i>
                        </button>
                        <h3>Профиль</h3>
                    `;
                    break;
                case 'planet':
                    content = `
                        <button class="close-button" type="button">
                            <i class="material-icons">close</i>
                        </button>
                        <h3>Информация о планете</h3>
                    `;
                    break;
                case 'tasks':
                    content = `
                        <button class="close-button" type="button">
                            <i class="material-icons">close</i>
                        </button>
                        <h3>Доступные задания</h3>
                    `;
                    break;
                case 'wallet':
                    content = `
                        <button class="close-button" type="button">
                            <i class="material-icons">close</i>
                        </button>
                        <h3>Кошелёк</h3>
                    `;
                    break;
            }
            
            // Update content
            tabInner.innerHTML = content;
            
            // Add click handler for close button
            const closeButton = tabInner.querySelector('.close-button');
            ['click', 'touchend'].forEach(eventType => {
                closeButton.addEventListener(eventType, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    tabContent.classList.remove('active');
                    clickedButton.classList.remove('active');
                    tabInner.style.opacity = '0';
                }, { passive: false });
            });
            
            // Show tab with animation
            requestAnimationFrame(() => {
                tabContent.classList.add('active');
                requestAnimationFrame(() => {
                    tabInner.style.opacity = '1';
                });
            });
        }
    </script>
</body>
</html>
